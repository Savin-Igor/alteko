# Production compose for ALTEKO on the shared Hetzner VPS.
# Deploy path: /opt/alteko/
# Secrets:     /opt/alteko/.env  (rewritten from GitHub Secrets on every deploy)
#
# Reverse proxy: host nginx (80/443, Certbot SSL) → 127.0.0.1:3020 → app:3000
#
# Port allocation on the shared server:
#   3010 — MezaData
#   3020 — ALTEKO          ← this project
#   3030+ — future projects
#
# Data lives on the Hetzner Volume (/mnt/data) so it survives server rebuild.
#
# First-time server setup: see docs/DEPLOY.md and issue #137.
#
# After each deploy (CI does this automatically):
#   docker compose pull app
#   docker compose up -d --no-deps --remove-orphans app

services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-savin-igor/alteko}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:3020:3000"
    env_file: .env
    environment:
      # Next.js standalone server defaults to binding on localhost (127.0.0.1),
      # which inside the container resolves to ::1 (IPv6). Docker's wget-based
      # healthcheck connects via IPv4, so it hits "Connection refused".
      # Binding on 0.0.0.0 makes the server accept connections on all interfaces.
      HOSTNAME: "0.0.0.0"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    # Migrations run on every start — prisma migrate deploy is idempotent.
    entrypoint: ["/docker-entrypoint.sh"]
    command: ["node", "server.js"]
    # Next.js standalone server binds to process.env.HOSTNAME. Docker sets
    # HOSTNAME to the container ID by default, so the app listens on the
    # bridge interface (172.17.x.x) and is unreachable on loopback.
    # Override to 0.0.0.0 so it binds to every interface — required for
    # the wget-based healthcheck below to reach localhost:3000.
    environment:
      HOSTNAME: "0.0.0.0"
    # /api/health does a SELECT 1 against Postgres and returns 503 when DB is
    # unreachable, so this check covers liveness + readiness in one probe.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    # Keep the app within a known memory budget. The shared VPS has 4 GB total
    # split across MezaData + ALTEKO + system. 768 MB is enough for steady-state
    # Next.js SSR; raise to 1g if 502s appear during peak SSR.
    mem_limit: 768m
    cpus: 1.0

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: alteko
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # Hetzner Volume bind — survives docker prune and server rebuild.
      # First-time setup creates this dir owned by uid 70 (alpine postgres).
      - /mnt/data/alteko/postgres:/var/lib/postgresql/data
    # No port exposure — only the app talks to db on the internal network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: 0.5

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      # Internal only — no public console exposure.
      # Access console via SSH tunnel: ssh -L 9001:localhost:9001 palpalych
      - "127.0.0.1:3021:9000"
    env_file: .env
    volumes:
      # Hetzner Volume bind — Ceph-backed, survives docker prune and server rebuild.
      - /mnt/data/alteko/minio:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 256m
    cpus: 0.5

  minio-init:
    image: minio/mc:RELEASE.2024-11-09T19-22-20Z
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/alteko-documents local/alteko-uploads local/alteko-reports local/alteko-media
