# Production compose — uses pre-built image from GHCR.
# For local dev use: docker compose -f docker-compose.db.yml up -d
#
# Required env vars on VPS:
#   IMAGE_TAG       — git SHA from CI (defaults to "latest")
#   GITHUB_REPOSITORY — e.g. savin-igor/alteko (set by GitHub Actions)
#   POSTGRES_USER, POSTGRES_PASSWORD — strong credentials for production

services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-savin-igor/alteko}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env.production
    depends_on:
      db:
        condition: service_healthy
    # Migrations run on every start — prisma migrate deploy is idempotent
    entrypoint: ["/docker-entrypoint.sh"]
    command: ["node", "server.js"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: alteko
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      # Bind mount: data visible on host, survives docker removal
      - ./data/postgres:/var/lib/postgresql/data
    # No port exposure in production — only app talks to db on internal network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
