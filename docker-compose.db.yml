# LOCAL DEVELOPMENT compose — Postgres + MinIO + Mailhog + scripts runner.
#
# This file is for local dev only. Production uses docker-compose.yml at the
# repo root, which pulls a pre-built image from GHCR and bind-mounts to
# /mnt/data/alteko/*. See docs/DEPLOY.md.
#
# Usage:
#   make dev          — daily: bring up db, sync schema, run npm dev on host
#   make dev-setup    — first time: + seed
#   make dev-fresh    — wipe .next, push schema, run dev
#
# Local app port: 3000 (host). Production port on the shared VPS: 3020.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: alteko
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      # Named volume keeps Postgres data out of the project tree so the
      # Next.js build does not hit EACCES when scanning the workspace.
      # Migration from the legacy ./data/postgres bind-mount is documented
      # in docs/technical/local-development.md.
      - alteko_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO — S3-compatible local object storage for files, PDFs, reports
  # Web console: http://localhost:9001  (login: minioadmin / minioadmin)
  # S3 API:      http://localhost:9000
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      # See alteko_postgres_data above — same reason.
      - alteko_minio_data:/data
    ports:
      - "9100:9000"   # S3 API  (9000 taken on host — use localhost:9100)
      - "9101:9001"   # Web console (http://localhost:9101)
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Creates the alteko-local bucket on first start (idempotent).
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/alteko-local &&
        mc anonymous set download local/alteko-local &&
        echo 'MinIO bucket alteko-local ready'
      "
    profiles:
      - init

  # Mailhog — local SMTP server + web UI for viewing sent emails
  # SMTP:    localhost:1025  (no auth)
  # Web UI:  http://localhost:8025
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    restart: "no"

  # One-off runner for sync scripts and seeds.
  # Note: the project root is bind-mounted at /app, but the workspace
  # never contains the database — that lives in the named volume above.
  # Usage: docker compose -f docker-compose.db.yml run --rm scripts npx tsx scripts/sync-vzd.ts
  scripts:
    build:
      context: .
      dockerfile: Dockerfile.scripts
    volumes:
      - .:/app
    working_dir: /app
    env_file:
      - path: .env.local
        required: false
    environment:
      # Override DATABASE_URL from .env.local — inside Docker, db is reachable via service name
      DATABASE_URL: postgresql://postgres:postgres@db:5432/alteko
      SKIP_ENV_VALIDATION: "true"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - scripts

# Named volumes — wipe with `make db-nuke` (drops all local DB and MinIO data).
volumes:
  alteko_postgres_data:
  alteko_minio_data:
