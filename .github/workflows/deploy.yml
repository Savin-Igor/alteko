name: Deploy

# Tag-driven deploy.
# Push to main → CI only (see ci.yml).
# Pushing a tag matching v* → build + push image to GHCR + deploy to Hetzner.
#
# Cut a release:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Or trigger manually from the Actions tab (uses HEAD of the chosen branch).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Build & push image to GHCR ──────────────────────────────────────────
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_full: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Deploy to Hetzner VPS ───────────────────────────────────────────────
  deploy:
    name: Deploy to Hetzner
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ needs.build.outputs.version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          LVM_GEOSERVER_URL: ${{ secrets.LVM_GEOSERVER_URL }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: IMAGE_TAG,GITHUB_REPOSITORY,POSTGRES_PASSWORD,NEXTAUTH_SECRET,OPENAI_API_KEY,RESEND_API_KEY,ADMIN_EMAIL,PAYLOAD_SECRET,LVM_GEOSERVER_URL,S3_ENDPOINT,S3_REGION,S3_BUCKET,S3_ACCESS_KEY_ID,S3_SECRET_ACCESS_KEY,GHCR_TOKEN,SENTRY_DSN
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd /opt/alteko

            # Docker registry refs must be lowercase. github.repository is
            # typically the canonical "Owner/Name" form and may contain
            # uppercase letters (e.g. "Savin-Igor/alteko") which docker
            # compose pull rejects with "invalid reference format". Force
            # lowercase here so the image:tag reference always validates.
            GITHUB_REPOSITORY=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')

            # ── Write .env from secrets ───────────────────────────────────
            # The file is rewritten on every deploy. Never edit manually on the server.
            umask 077
            cat > .env <<EOF
            # Generated by GitHub Actions deploy. Do not edit by hand.
            DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/alteko
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

            NODE_ENV=production
            NEXT_PUBLIC_APP_URL=https://alteko.lv
            NEXTAUTH_URL=https://alteko.lv
            NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
            # PAYLOAD_SECRET falls back to NEXTAUTH_SECRET if the dedicated secret
            # is not set yet — keeps first deploy unblocked, but rotate ASAP.
            PAYLOAD_SECRET=${PAYLOAD_SECRET:-${NEXTAUTH_SECRET}}

            OPENAI_API_KEY=${OPENAI_API_KEY}

            EMAIL_SERVER_HOST=smtp.resend.com
            EMAIL_SERVER_PORT=587
            EMAIL_SERVER_USER=resend
            EMAIL_SERVER_PASSWORD=${RESEND_API_KEY}
            EMAIL_FROM=ALTEKO <noreply@alteko.lv>
            ADMIN_EMAIL=${ADMIN_EMAIL}

            LVM_GEOSERVER_URL=${LVM_GEOSERVER_URL}

            S3_ENDPOINT=${S3_ENDPOINT}
            S3_REGION=${S3_REGION}
            S3_BUCKET=${S3_BUCKET}
            S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
            S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
            MINIO_ROOT_USER=${S3_ACCESS_KEY_ID}
            MINIO_ROOT_PASSWORD=${S3_SECRET_ACCESS_KEY}
            SENTRY_DSN=${SENTRY_DSN:-}

            APP_VERSION=${IMAGE_TAG}
            IMAGE_TAG=${IMAGE_TAG}
            GITHUB_REPOSITORY=${GITHUB_REPOSITORY}
            EOF

            # ── Authenticate to GHCR (private images) ──────────────────────
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u github-actions --password-stdin

            # ── Pre-deploy DB backup with rotation ─────────────────────────
            mkdir -p /mnt/data/alteko/backups
            BACKUP_FILE="/mnt/data/alteko/backups/backup-$(date -u +%Y%m%d-%H%M%S).sql.gz"
            if docker compose ps -q db | grep -q .; then
              echo "Backing up DB to ${BACKUP_FILE}..."
              docker compose exec -T db pg_dump -U postgres alteko | gzip > "${BACKUP_FILE}" || {
                echo "WARNING: pre-deploy backup failed, continuing anyway"
                rm -f "${BACKUP_FILE}"
              }
              # Keep only the 10 most recent dumps
              ls -1t /mnt/data/alteko/backups/backup-*.sql.gz 2>/dev/null | tail -n +11 | xargs -r rm -f
            else
              echo "DB not running yet — skipping pre-deploy backup (first deploy)"
            fi

            # ── Ensure MinIO data directory exists (first-deploy setup) ──
            mkdir -p /mnt/data/alteko/minio

            # ── Pull and restart ──────────────────────────────────────────
            docker compose pull app
            docker compose up -d --remove-orphans

            # ── Wait for /api/health to return 200 (max 90s) ──────────────
            echo "Waiting for /api/health..."
            ok=0
            for i in $(seq 1 30); do
              if curl -fsS --max-time 5 http://127.0.0.1:3020/api/health > /dev/null; then
                echo "App healthy after ${i} attempts"
                ok=1
                break
              fi
              sleep 3
            done

            if [ "${ok}" != "1" ]; then
              echo "===== DEPLOY FAILED — health probe never returned 200 ====="
              echo "----- app logs (last 100) -----"
              docker compose logs app --tail 100 || true
              echo "----- db logs (last 50) -----"
              docker compose logs db --tail 50 || true
              exit 1
            fi

            # ── Cleanup ───────────────────────────────────────────────────
            docker image prune -f
            echo "Deployed ALTEKO ${IMAGE_TAG}"

            # ── Smoke tests — verify key public pages return 200 ─────────────────
            echo "Running smoke tests..."
            smoke_ok=1
            for path in "/" "/ru" "/api/health" "/sitemap.xml" "/robots.txt"; do
              if ! curl -fsS --max-time 10 "https://alteko.lv${path}" > /dev/null 2>&1; then
                echo "SMOKE FAIL: https://alteko.lv${path} did not return 200"
                smoke_ok=0
              fi
            done
            if [ "${smoke_ok}" = "0" ]; then
              echo "===== SOME SMOKE TESTS FAILED — manual verification recommended ====="
            else
              echo "All smoke tests passed."
            fi
