name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ghcr.io/${{ github.repository }}:${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha,scope=main
          cache-to: type=gha,mode=max,scope=main

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # Only deploy if DEPLOY_HOST secret is set
    if: ${{ secrets.DEPLOY_HOST != '' }}

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/alteko

            # Backup DB before deploy
            docker compose exec -T db pg_dump -U "$POSTGRES_USER" alteko \
              > "backups/backup-$(date +%Y%m%d-%H%M%S).sql" 2>/dev/null || true

            # Pull new image and restart only the app container
            IMAGE_TAG=${{ github.sha }}
            export IMAGE_TAG
            docker compose pull app
            docker compose up -d app

            # Remove dangling images
            docker image prune -f

            echo "Deploy complete: $IMAGE_TAG"
