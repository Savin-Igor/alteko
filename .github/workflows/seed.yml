name: Seed

# Manual seed runner — uses the seeder Docker image (full node_modules + source)
# to execute TypeScript maintenance scripts on the VPS.
# The seeder container joins the alteko Docker network so it can reach db and minio.
#
# Usage:
#   gh workflow run seed.yml -f job=blog-all
on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Which seed job to run'
        required: true
        type: choice
        options:
          - blog-all
          - blog-articles
          - blog-readiness

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  seed-ssh:
    name: Seed via SSH
    runs-on: ubuntu-latest

    steps:
      - uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: GHCR_TOKEN
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/alteko

            IMAGE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u github-actions --password-stdin

            run_seed() {
              local script="$1"
              echo "==> Running ${script}..."
              docker run --rm \
                --env-file .env \
                --network alteko_default \
                "${IMAGE}:seeder" \
                "scripts/${script}"
              echo "==> ${script} done."
            }

            docker pull "${IMAGE}:seeder"

            case "${{ inputs.job }}" in
              blog-all)
                run_seed "seed-blog-articles.ts"
                run_seed "seed-blog-readiness-pack.ts"
                ;;
              blog-articles)
                run_seed "seed-blog-articles.ts"
                ;;
              blog-readiness)
                run_seed "seed-blog-readiness-pack.ts"
                ;;
            esac
